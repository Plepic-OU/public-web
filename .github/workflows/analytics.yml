name: Analytics Export

on:
  schedule:
    # Daily at 04:00 UTC (07:00 Estonia) — must complete before the
    # weekly review trigger fires at 05:00 UTC (08:00 Estonia)
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  export-ga4:
    name: Export GA4 Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Export GA4 analytics
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA_SERVICE_ACCOUNT_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
        run: npx ts-node scripts/export-analytics.ts

      - uses: actions/upload-artifact@v4
        with:
          name: ga4-report
          path: analytics/reports/*-ga4.json
          retention-days: 90

  export-ads:
    name: Export Google Ads Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Export Google Ads data
        env:
          ADS_CUSTOMER_ID: ${{ secrets.ADS_CUSTOMER_ID }}
          ADS_DEVELOPER_TOKEN: ${{ secrets.ADS_DEVELOPER_TOKEN }}
          ADS_CLIENT_ID: ${{ secrets.ADS_CLIENT_ID }}
          ADS_CLIENT_SECRET: ${{ secrets.ADS_CLIENT_SECRET }}
          ADS_REFRESH_TOKEN: ${{ secrets.ADS_REFRESH_TOKEN }}
        run: npx ts-node scripts/export-ads.ts

      - uses: actions/upload-artifact@v4
        with:
          name: ads-report
          path: analytics/reports/*-ads.json
          retention-days: 90

  optimize-ads:
    name: Optimize Ads (Dry Run)
    needs: [export-ga4, export-ads]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: ga4-report
          path: analytics/reports/

      - uses: actions/download-artifact@v4
        with:
          name: ads-report
          path: analytics/reports/

      - name: Run ads optimizer (dry run)
        env:
          ADS_CUSTOMER_ID: ${{ secrets.ADS_CUSTOMER_ID }}
          ADS_DEVELOPER_TOKEN: ${{ secrets.ADS_DEVELOPER_TOKEN }}
          ADS_CLIENT_ID: ${{ secrets.ADS_CLIENT_ID }}
          ADS_CLIENT_SECRET: ${{ secrets.ADS_CLIENT_SECRET }}
          ADS_REFRESH_TOKEN: ${{ secrets.ADS_REFRESH_TOKEN }}
        run: npx ts-node scripts/optimize-ads.ts --dry-run

      - name: Push reports to private repo
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          # Clone the private repo with token auth
          git clone "https://x-access-token:${PRIVATE_REPO_TOKEN}@github.com/ad112/Plepic-Business.git" /tmp/private-repo

          # Copy the freshly downloaded reports
          mkdir -p /tmp/private-repo/analytics/reports
          cp analytics/reports/*-ga4.json /tmp/private-repo/analytics/reports/ 2>/dev/null || true
          cp analytics/reports/*-ads.json /tmp/private-repo/analytics/reports/ 2>/dev/null || true

          cd /tmp/private-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add analytics/reports/

          if git diff --staged --quiet; then
            echo "No new reports to push"
          else
            git commit -m "chore: sync analytics reports $(date -u +%Y-%m-%d)"
            git push
            echo "Reports pushed to private repo"
          fi

