name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Remove orphan files from deploy
        run: |
          # Internal-only / prototype / build-tooling files that should not
          # be publicly reachable on plepic.com. Keep this list in sync with
          # repo hygiene; if a file here gets a real public role, remove
          # it from this list rather than working around the deploy.
          rm -rf _archive playwright-report tests
          rm -f  design-system.html font-compare.html demo-tenders.html
          rm -rf docs/training-one-pager
          rm -rf docs/specs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
